name: Android CI

# Compila y testea en cada push/PR. En los tags v* además publica una Release con el APK:
# firmado con el keystore del repo si existen los secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD,
# KEY_ALIAS, KEY_PASSWORD); si no, sube el APK debug.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # crear la Release en tags
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opendmo-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare signing (tag + secrets)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "sin secrets de firma: la release llevará el APK debug"; exit 0; fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          cat > "$RUNNER_TEMP/keystore.properties" <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "OPENDMO_KEYSTORE=$RUNNER_TEMP/keystore.properties" >> "$GITHUB_ENV"

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/') && env.OPENDMO_KEYSTORE != ''
        run: ./gradlew assembleRelease

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
          generate_release_notes: true
